<aside
  class="h-full border-r border-gray-200 dark:border-gray-700 transition-all duration-300 bg-gray-50 dark:bg-gray-800 overflow-hidden"
  [class.w-64]="layout.sidebarOpen()"
  [class.w-16]="!layout.sidebarOpen()"
>
  <nav class="flex flex-col p-3 gap-1">
    @for (item of navItems; track item.route) {
      <a
        [routerLink]="item.route"
        routerLinkActive="bg-indigo-100 dark:bg-indigo-900/40 text-indigo-700 dark:text-indigo-300"
        class="flex items-center py-2.5 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors text-gray-700 dark:text-gray-300"
        [class.gap-4]="layout.sidebarOpen()"
        [class.px-3]="layout.sidebarOpen()"
        [class.justify-center]="!layout.sidebarOpen()"
        [title]="item.label"
      >
        <mat-icon class="shrink-0">{{ item.icon }}</mat-icon>
        @if (layout.sidebarOpen()) {
          <span class="whitespace-nowrap font-medium">
            {{ item.label }}
          </span>
        }
      </a>
    }
  </nav>
</aside>
